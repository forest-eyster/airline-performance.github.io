  .summary-card:hover{border-color:currentColor}
  .summary-airline{font-size:12px;font-weight:700;margin-bottom:9px}
  .summary-row{font-size:11px;color:#64748b;margin-bottom:3px;font-family:'DM Mono',monospace}

  .tooltip-box{background:#0a1628;border:1px solid #1e3a5f;border-radius:8px;padding:10px 14px;font-size:12px;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}

  .tooltip-row{display:flex;justify-content:space-between;gap:16px;margin-bottom:2px;font-weight:600}
  .note{font-size:11px;color:#334155;margin-top:12px;text-align:center;font-family:'DM Mono',monospace}

const COLORS={"Alaska Airlines Inc.":"#38bdf8","American Airlines Inc.":"#f87171","Delta Air Lines Inc.":"#a78bfa","Frontier Airlines Inc.":"#34d399","Hawaiian Airlines Inc.":"#fbbf24","JetBlue Airways":"#22d3ee","Southwest Airlines Co.":"#fb923c","United Air Lines Inc.":"#818cf8"};
const SHORT={"Alaska Airlines Inc.":"Alaska","American Airlines Inc.":"American","Delta Air Lines Inc.":"Delta","Frontier Airlines Inc.":"Frontier","Hawaiian Airlines Inc.":"Hawaiian","JetBlue Airways":"JetBlue","Southwest Airlines Co.":"Southwest","United Air Lines Inc.":"United"};
const YEARS=["All","2013","2014","2015","2016","2017","2018","2019","2020","2021","2022","2023"];

function buildData(sel,yr,field){
  const keys=new Set();
  sel.forEach(a=>RAW[a].forEach(r=>{if(yr==="All"||r.month_key.startsWith(yr))keys.add(r.month_key)}));
  return Array.from(keys).sort().map(mk=>{
    const o={month:mk};
    sel.forEach(a=>{const r=RAW[a].find(x=>x.month_key===mk);if(r)o[SHORT[a]]=r[field];});
    return o;
  });
}

function TooltipLine({active,payload,label}){
  if(!active||!payload?.length)return null;
  return React.createElement('div',{className:'tooltip-box'},[
    React.createElement('div',{className:'tooltip-label',key:'l'},label),
    ...[...payload].sort((a,b)=>b.value-a.value).map(p=>
      React.createElement('div',{className:'tooltip-row',key:p.name,style:{color:p.color}},
        React.createElement('span',null,p.name),
        React.createElement('span',null,p.value?.toFixed(1)+'%')
      )
    )
  ]);
}

function TooltipBar({active,payload,label}){
  if(!active||!payload?.length)return null;
  return React.createElement('div',{className:'tooltip-box'},[
    React.createElement('div',{className:'tooltip-label',key:'l'},label),
    ...payload.map(p=>
      React.createElement('div',{className:'tooltip-row',key:p.name,style:{color:p.color}},
        React.createElement('span',null,p.name),
        React.createElement('span',{style:{color:p.value>=0?'#34d399':'#f87171'}},
          (p.value>=0?'+':'')+p.value?.toFixed(1)+'pp'
        )
      )
    )
  ]);
}

            React.createElement(LineChart,{data:lineData,margin:{top:5,right:20,left:0,bottom:5}},[
              React.createElement(CartesianGrid,{key:'cg',strokeDasharray:'3 3',stroke:'#1e3a5f'}),
              React.createElement(XAxis,{key:'x',dataKey:'month',tick:{fill:'#475569',fontSize:11},interval:iv,tickLine:false,axisLine:{stroke:'#1e3a5f'}}),
              React.createElement(YAxis,{key:'y',domain:[40,100],tick:{fill:'#475569',fontSize:11},tickLine:false,axisLine:false,tickFormatter:v=>v+'%'}),
              React.createElement(Tooltip,{key:'tt',content:React.createElement(TooltipLine)}),
              React.createElement(Legend,{key:'lg',wrapperStyle:{fontSize:12,paddingTop:10}}),
              ...sel.map(a=>React.createElement(Line,{key:a,type:'monotone',dataKey:SHORT[a],stroke:COLORS[a],strokeWidth:2,dot:false,activeDot:{r:4}}))
            ])
          )
        : React.createElement(ResponsiveContainer,{key:'bc',width:'100%',height:370},
            React.createElement(BarChart,{data:momData,margin:{top:5,right:20,left:0,bottom:5}},[
              React.createElement(CartesianGrid,{key:'cg',strokeDasharray:'3 3',stroke:'#1e3a5f'}),
              React.createElement(XAxis,{key:'x',dataKey:'month',tick:{fill:'#475569',fontSize:11},interval:iv,tickLine:false,axisLine:{stroke:'#1e3a5f'}}),
              React.createElement(YAxis,{key:'y',tick:{fill:'#475569',fontSize:11},tickLine:false,axisLine:false,tickFormatter:v=>(v>0?'+':'')+v+'pp'}),
              React.createElement(Tooltip,{key:'tt',content:React.createElement(TooltipBar)}),
              React.createElement(ReferenceLine,{key:'rl',y:0,stroke:'#334155',strokeWidth:1.5}),
              React.createElement(Legend,{key:'lg',wrapperStyle:{fontSize:12,paddingTop:10}}),
              ...sel.map(a=>React.createElement(Bar,{key:a,dataKey:SHORT[a],fill:COLORS[a],opacity:0.85,radius:[2,2,0,0],maxBarSize:sel.length>3?6:12}))
            ])
          )
    ]),
    // Summary cards
    React.createElement('div',{className:'summary-grid',key:'sum'},
      sel.map(a=>{
        const rows=RAW[a].filter(r=>yr==="All"||r.month_key.startsWith(yr));
        const avg=rows.reduce((s,r)=>s+r.on_time_pct,0)/rows.length;
        const best=Math.max(...rows.map(r=>r.on_time_pct));
        const worst=Math.min(...rows.map(r=>r.on_time_pct));
        return React.createElement('div',{key:a,className:'summary-card',style:{borderColor:COLORS[a]+'33',color:COLORS[a]}},[
          React.createElement('div',{className:'summary-airline',key:'n',style:{color:COLORS[a]}},SHORT[a]),
          React.createElement('div',{className:'summary-row',key:'a'},'Avg: ',React.createElement('span',{style:{color:'#e2e8f0'}},avg.toFixed(1)+'%')),
          React.createElement('div',{className:'summary-row',key:'b'},'Best: ',React.createElement('span',{style:{color:'#34d399'}},best.toFixed(1)+'%')),
          React.createElement('div',{className:'summary-row',key:'w'},'Worst: ',React.createElement('span',{style:{color:'#f87171'}},worst.toFixed(1)+'%'))
        ]);
      })
    ),
    React.createElement('div',{className:'note',key:'note'},'Source: Bureau of Transportation Statistics · Data 2013–2023')
  ]);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
